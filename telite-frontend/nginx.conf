server {
    listen 80;
    server_name _;
    client_max_body_size 100M;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://backend:8001;

    root /usr/share/nginx/html;
    index index.html;

    location @backend {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /categories {
        try_files /__backend__ @backend;
    }

    location ~ ^/categories/[^/]+/?$ {
        try_files /__backend__ @backend;
    }

    location ~ ^/categories/[^/]+/courses {
        try_files /__backend__ @backend;
    }

    location ~ ^/(api|auth|users|dashboard|enrol|tasks|pal|notifications|settings|admin|signup|courses|health|moodle|authoring) {
        try_files /__backend__ @backend;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
