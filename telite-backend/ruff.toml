# Ruff configuration for Telite LMS Backend
line-length = 120

[lint]
# Enable standard rules
select = ["E", "F", "W", "I"]

# Ignore style, whitespace, import sorting, and line length rules to prevent CI failures on legacy code
ignore = [
    "I001",  # Import block sorting
    "E501",  # Line too long
    "W291",  # Trailing whitespace
    "W293",  # Blank line whitespace
    "E402",  # Module level import not at top of file
    "F841",  # Local variable assigned but never used
    "F401",  # Unused imports (we've cleaned major ones, ignore remaining)
    "E722"   # Bare except (we've cleaned major ones, ignore remaining)
]

[lint.per-file-ignores]
# Ignore undefined name (F821) errors in models since they use SQLAlchemy forward refs as strings
"app/models/*" = ["F821"]
"app/db/migrations/*" = ["E402", "F401"]
