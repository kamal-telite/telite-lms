name: Telite LMS CI

on:
  push:
    branches: [ main, dev, Dev ]
  pull_request:
    branches: [ main, dev, Dev ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: '3.12'
  PACKAGE_REQUIREMENTS: telite-backend/requirements.txt
  DOCKER_IMAGE_NAME: telite-backend:latest
  BUILD_CACHE_DIR: /tmp/.buildx-cache
  COVERAGE_ARTIFACT: coverage.xml

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.PACKAGE_REQUIREMENTS }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Run Ruff with GitHub annotations
        run: ruff check telite-backend/app --output-format github

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.PACKAGE_REQUIREMENTS }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Bandit
        run: python -m pip install bandit

      - name: Run Bandit strict security scan
        run: |
          bandit -r telite-backend/app --confidence-level high --severity-level high

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [lint, security]
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: telite_backend_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd "pg_isready -U postgres -d telite_backend_test -h localhost -p 5432"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.PACKAGE_REQUIREMENTS }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend dependencies
        run: |
          python -m pip install -r telite-backend/requirements.txt
          python -m pip install pytest httpx pytest-cov

      - name: Wait for PostgreSQL and Redis
        run: |
          python - <<'PY'
          import socket
          import sys
          import time

          targets = [
              ('PostgreSQL', 'postgres', 5432),
              ('Redis', 'redis', 6379),
          ]

            for name, host, port in targets:
              for attempt in range(60):
                try:
                  with socket.create_connection((host, port), timeout=2):
                    print(f'{name} is ready on {host}:{port}')
                    break
                except OSError:
                  time.sleep(2)
              else:
                print(f'{name} not ready after 60 retries', file=sys.stderr)
                sys.exit(1)
          PY

      - name: Run Alembic migrations
        env:
          TELITE_DB_BACKEND: postgres
          TELITE_POSTGRES_HOST: postgres
          TELITE_POSTGRES_PORT: 5432
          TELITE_POSTGRES_DB: telite_backend_test
          TELITE_POSTGRES_USER: postgres
          TELITE_POSTGRES_PASSWORD: testpassword
        run: |
          cd telite-backend
          python -m alembic upgrade head

      - name: Run pytest with coverage
        env:
          TELITE_DB_BACKEND: postgres
          TELITE_POSTGRES_HOST: postgres
          TELITE_POSTGRES_PORT: 5432
          TELITE_POSTGRES_DB: telite_backend_test
          TELITE_POSTGRES_USER: postgres
          TELITE_POSTGRES_PASSWORD: testpassword
          REDIS_HOST: redis
          REDIS_PORT: 6379
          REDIS_ENABLED: 'true'
          ENVIRONMENT: testing
          TELITE_AUTH_SECRET: testing-secret-key-32-chars-long-or-more
          TELITE_PASSWORD_SALT: testing-salt-key
        run: |
          cd telite-backend
          python -m pytest tests/ --cov=app --cov-report=xml --cov-fail-under=80

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: telite-backend/${{ env.COVERAGE_ARTIFACT }}

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: telite-frontend/package-lock.json

      - name: Install frontend dependencies and build
        run: |
          npm ci
          npm run build
        working-directory: telite-frontend

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image with Buildx cache
        uses: docker/build-push-action@v5
        with:
          context: ./telite-backend
          file: ./telite-backend/Dockerfile
          push: false
          tags: ${{ env.DOCKER_IMAGE_NAME }}
          cache-from: type=local,src=${{ env.BUILD_CACHE_DIR }}
          cache-to: type=local,dest=${{ env.BUILD_CACHE_DIR }},mode=max
          outputs: type=docker,dest=/tmp/backend-image.tar

      - name: Upload built backend image
        uses: actions/upload-artifact@v4
        with:
          name: backend-image-tar
          path: /tmp/backend-image.tar

  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download built backend image
        uses: actions/download-artifact@v4
        with:
          name: backend-image-tar
          path: /tmp

      - name: Load backend image into Docker
        run: docker load --input /tmp/backend-image.tar

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@v0.34.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE_NAME }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
