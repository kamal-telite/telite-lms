name: Telite LMS CI

on:
  push:
    branches: [ main, dev, Dev ]
  pull_request:
    branches: [ main, dev, Dev ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: '3.12'
  PACKAGE_REQUIREMENTS: telite-backend/requirements.txt
  DOCKER_IMAGE_NAME: telite-backend:latest
  BUILD_CACHE_DIR: /tmp/.buildx-cache
  TRIVY_VERSION: 'v0.34.0'
  COVERAGE_ARTIFACT: coverage.xml

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.PACKAGE_REQUIREMENTS }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Run Ruff with GitHub annotations
        run: ruff check telite-backend/app --format github-annotations

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.PACKAGE_REQUIREMENTS }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Bandit
        run: python -m pip install bandit

      - name: Run Bandit strict security scan
        run: |
          bandit -r telite-backend/app --confidence high --severity high -ll -ii

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [lint, security]
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: telite_backend_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -h localhost -p 5432"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.PACKAGE_REQUIREMENTS }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend dependencies
        run: |
          python -m pip install -r telite-backend/requirements.txt
          python -m pip install pytest httpx pytest-cov

      - name: Wait for PostgreSQL and Redis
        run: |
          python - <<'PY'
            import socket, sys, time

            for name, port in [('PostgreSQL', 5432), ('Redis', 6379)]:
                for attempt in range(30):
                    try:
                        with socket.create_connection(('localhost', port), timeout=2):
                            print(f'{name} ready on port {port}')
                            break
                    except OSError:
                        time.sleep(2)
                else:
                    print(f'{name} not ready after 30 retries', file=sys.stderr)
                    sys.exit(1)
          PY

      - name: Run Alembic migrations
        env:
          TELITE_DB_BACKEND: postgres
          TELITE_POSTGRES_HOST: localhost
          TELITE_POSTGRES_PORT: 5432
          TELITE_POSTGRES_DB: telite_backend_test
          TELITE_POSTGRES_USER: postgres
          TELITE_POSTGRES_PASSWORD: testpassword
        run: |
          cd telite-backend
          python -m alembic upgrade head

      - name: Run pytest with coverage
        env:
          TELITE_DB_BACKEND: postgres
          TELITE_POSTGRES_HOST: localhost
          TELITE_POSTGRES_PORT: 5432
          TELITE_POSTGRES_DB: telite_backend_test
          TELITE_POSTGRES_USER: postgres
          TELITE_POSTGRES_PASSWORD: testpassword
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_ENABLED: 'true'
          ENVIRONMENT: testing
          TELITE_AUTH_SECRET: testing-secret-key-32-chars-long-or-more
          TELITE_PASSWORD_SALT: testing-salt-key
        run: |
          cd telite-backend
          python -m pytest tests/ --cov=app --cov-report=xml --cov-fail-under=80

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: telite-backend/${{ env.COVERAGE_ARTIFACT }}

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image with Buildx cache
        uses: docker/build-push-action@v5
        with:
          context: ./telite-backend
          file: ./telite-backend/Dockerfile
          push: false
          tags: ${{ env.DOCKER_IMAGE_NAME }}
          cache-from: type=local,src=${{ env.BUILD_CACHE_DIR }}
          cache-to: type=local,dest=${{ env.BUILD_CACHE_DIR }},mode=max
          outputs: type=docker,dest=/tmp/backend-image.tar

      - name: Upload built backend image
        uses: actions/upload-artifact@v4
        with:
          name: backend-image-tar
          path: /tmp/backend-image.tar

  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download built backend image
        uses: actions/download-artifact@v4
        with:
          name: backend-image-tar
          path: /tmp

      - name: Load backend image into Docker
        run: docker load --input /tmp/backend-image.tar

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@${{ env.TRIVY_VERSION }}
        with:
          image-ref: ${{ env.DOCKER_IMAGE_NAME }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
