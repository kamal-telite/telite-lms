name: Telite LMS CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Production Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Example template step for logging in to AWS ECR or DockerHub
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./telite-backend
          file: ./telite-backend/Dockerfile
          push: false
          tags: |
            telite-backend:${{ github.sha }}
            telite-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./telite-frontend
          file: ./telite-frontend/Dockerfile
          push: false
          tags: |
            telite-frontend:${{ github.sha }}
            telite-frontend:latest

